name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/zynact_deploy_key
          chmod 600 ~/.ssh/zynact_deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy code to server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/zynact_deploy_key" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='.cache' \
            --exclude='pnpm-lock.yaml' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/development/senkuon-web/

      - name: Create environment file
        run: |
          ssh -i ~/.ssh/zynact_deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          cd /home/development/senkuon-web
          
          cat > .env << EOENV
          NODE_ENV=${{ vars.ENVIRONMENT }}
          APP_KEYS=${{ secrets.APP_KEYS }}
          API_TOKEN_SALT=${{ secrets.API_TOKEN_SALT }}
          ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
          TRANSFER_TOKEN_SALT=${{ secrets.TRANSFER_TOKEN_SALT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          EOENV
          EOF

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/zynact_deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          cd /home/development/senkuon-web
          
          echo "Stopping existing containers..."
          docker compose down
          
          echo "Pruning unused Docker resources..."
          docker system prune -f --volumes
          
          echo "Building and starting services..."
          docker compose up -d --build
          
          echo "Checking container status..."
          docker compose ps
          
          echo "Deployment complete!"
          EOF
