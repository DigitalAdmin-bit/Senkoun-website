services:
  cms:
    container_name: senkuon-cms
    build:
      context: ./cms
      dockerfile: Dockerfile
    image: senkuon-cms:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: .tmp/data.db
    volumes:
      - cms_uploads:/opt/app/public/uploads
      - cms_data:/opt/app/.tmp
    ports:
      - "1337:1337"
    networks:
      - senkuon-network

  # Placeholder for web service (Next.js) - can be enabled later
  # web:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile
  #   container_name: senkuon-web
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: ${NODE_ENV:-production}
  #   networks:
  #     - senkuon-network
  #   depends_on:
  #     cms:
  #       condition: service_healthy

volumes:
  cms_uploads:
  cms_data:

networks:
  senkuon-network:
    name: senkuon-network
    driver: bridge
