version: '3.9'

services:
  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    container_name: senkuon-cms
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./cms/public/uploads:/app/public/uploads
      - ./cms/data:/app/data
      - ./cms/.cache:/app/.cache
      - ./cms/.tmp:/app/.tmp
      - ./cms/database:/app/database
    networks:
      - senkuon-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1337/admin', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Placeholder for web service (Next.js) - can be enabled later
  # web:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile
  #   container_name: senkuon-web
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: ${NODE_ENV:-production}
  #   networks:
  #     - senkuon-network
  #   depends_on:
  #     cms:
  #       condition: service_healthy

networks:
  senkuon-network:
    driver: bridge

volumes:
  cms_uploads:
  cms_data:
  cms_cache:

